permissions:
  contents: write

name: build.yml
on:
  push:
    tags:
      - 'v**'
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Set up Go
        uses: 'actions/setup-go@v5'
        with:
          go-version: '1.25.5'

      - name: Install dependencies
        run: brew tap slp/krun && brew install bash golangci-lint libarchive e2fsprogs virglrenderer libepoxy molten-vk bash

      - name: Build
        run: /opt/homebrew/bin/bash ./build.sh

      - name: Upload artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: revm-darwin
          path: |
            revm-*.tar.zst
          if-no-files-found: error
          overwrite: true

  build-linux:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Set up Go
        uses: 'actions/setup-go@v5'
        with:
          go-version: '1.25.5'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget patchelf libarchive-tools libarchive-dev libext2fs-dev libblkid-dev uuid-dev zstd

      - name: Build
        run: bash ./build.sh

      - name: Upload artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: revm-linux
          path: |
            revm-*.tar.zst
          if-no-files-found: error
          overwrite: true

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: 'actions/download-artifact@v4'
        with:
          pattern: revm-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: revm-*.tar.zst
          append_body: true
          draft: false
          prerelease: false
          make_latest: true