permissions:
  contents: write

name: build.yml
on:
  push:
    tags:
      - 'v**'
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Set up Go
        uses: 'actions/setup-go@v5'
        with:
          go-version: '1.25.5'

      - name: Install dependencies
        run: brew tap slp/krun && brew install golangci-lint libarchive e2fsprogs virglrenderer libepoxy molten-vk bzip2 zlib

      - name: Build release archive
        run: go run scripts/build.go

      - name: Verify packaged binaries
        run: |
          tar -tf chroot-*.tar.zst | grep -E '(^|/)(chroot)$'
          tar -tf dockerd-*.tar.zst | grep -E '(^|/)(dockerd)$'
          if tar -tf chroot-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi
          if tar -tf dockerd-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi

      - name: Upload artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: chroot-darwin
          path: |
            chroot-*.tar.zst
          if-no-files-found: error
          overwrite: true

      - name: Upload artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: dockerd-darwin
          path: |
            dockerd-*.tar.zst
          if-no-files-found: error
          overwrite: true

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            chroot_artifact_name: chroot-linux-x86_64
            dockerd_artifact_name: dockerd-linux-x86_64
          - runner: ubuntu-24.04-arm
            chroot_artifact_name: chroot-linux-aarch64
            dockerd_artifact_name: dockerd-linux-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Set up Go
        uses: 'actions/setup-go@v5'
        with:
          go-version: '1.25.5'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget patchelf libarchive-tools libarchive-dev libext2fs-dev libblkid-dev uuid-dev zstd
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Build release archive
        run: go run scripts/build.go

      - name: Verify packaged binaries
        run: |
          tar -tf chroot-*.tar.zst | grep -E '(^|/)(chroot)$'
          tar -tf dockerd-*.tar.zst | grep -E '(^|/)(dockerd)$'
          if tar -tf chroot-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi
          if tar -tf dockerd-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi

      - name: Upload chroot artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: ${{ matrix.chroot_artifact_name }}
          path: |
            chroot-*.tar.zst
          if-no-files-found: error
          overwrite: true

      - name: Upload dockerd artifact
        uses: 'actions/upload-artifact@v4'
        with:
          name: ${{ matrix.dockerd_artifact_name }}
          path: |
            dockerd-*.tar.zst
          if-no-files-found: error
          overwrite: true

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: 'actions/download-artifact@v4'
        with:
          pattern: '*'
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            chroot-*.tar.zst
            dockerd-*.tar.zst
          append_body: true
          draft: false
          prerelease: false
          make_latest: true
