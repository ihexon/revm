permissions:
  contents: write

name: build.yml
on:
  push:
    tags:
      - 'v**'
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
      - dev
      - refactor
    paths-ignore:
      - '**/*.md'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Set up Go
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.25.5'

      - name: Install dependencies
        run: brew install golangci-lint libarchive e2fsprogs bzip2 zlib

      - name: Build release archive
        run: go run scripts/build.go

      - name: Verify packaged binaries
        run: |
          tar -tf chroot-*.tar.zst | grep -E '(^|/)(chroot)$'
          tar -tf dockerd-*.tar.zst | grep -E '(^|/)(dockerd)$'
          if tar -tf chroot-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi
          if tar -tf dockerd-*.tar.zst | grep -E '(^|/)helper/guest-agent$'; then exit 1; fi

      - name: Upload artifact
        uses: 'actions/upload-artifact@v7'
        with:
          name: chroot-darwin
          path: |
            chroot-*.tar.zst
          if-no-files-found: error
          overwrite: true

      - name: Upload artifact
        uses: 'actions/upload-artifact@v7'
        with:
          name: dockerd-darwin
          path: |
            dockerd-*.tar.zst
          if-no-files-found: error
          overwrite: true

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            chroot_artifact_name: chroot-linux-x86_64
            dockerd_artifact_name: dockerd-linux-x86_64
          - runner: ubuntu-22.04-arm
            chroot_artifact_name: chroot-linux-aarch64
            dockerd_artifact_name: dockerd-linux-aarch64
    runs-on: ${{ matrix.runner }}
    env:
      LINUX_BUILDER_IMAGE: revm-builder:ubuntu-25.10
    steps:
      - name: Checkout
        uses: 'actions/checkout@v5'
        with:
          lfs: 'true'

      - name: Build Linux builder image
        run: docker build -t "$LINUX_BUILDER_IMAGE" .

      - name: Build release archive
        run: |
          docker run --rm \
            -e GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            --workdir "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            "$LINUX_BUILDER_IMAGE" \
            bash -c '
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          go run scripts/build.go
          '

      - name: Upload chroot artifact
        uses: 'actions/upload-artifact@v7'
        with:
          name: ${{ matrix.chroot_artifact_name }}
          path: |
            chroot-*.tar.zst
          if-no-files-found: error
          overwrite: true

      - name: Upload dockerd artifact
        uses: 'actions/upload-artifact@v7'
        with:
          name: ${{ matrix.dockerd_artifact_name }}
          path: |
            dockerd-*.tar.zst
          if-no-files-found: error
          overwrite: true

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: 'actions/download-artifact@v7'
        with:
          pattern: '*'
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            chroot-*.tar.zst
            dockerd-*.tar.zst
          append_body: true
          draft: false
          prerelease: false
          make_latest: true
